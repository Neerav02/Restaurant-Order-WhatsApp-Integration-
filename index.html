<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spice Garden – Order Online</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --fire:#FF4500;--ember:#FF6B35;--gold:#FFB347;--gold-lt:#FFE0B2;
  --ink:#0D0500;--ink2:#2C1206;--smoke:#7A5C4F;--cream:#FFF9F5;
  --card:#FFFFFF;--leaf:#1B7A4A;--leaf-bg:#E8F5EE;
  --chili:#C0392B;--chili-bg:#FDECEA;--wa:#25D366;
  --border:rgba(255,107,53,.13);--r:18px;--r-sm:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--ink);color:var(--cream);min-height:100vh;overflow-x:hidden}

/* PARTICLE CANVAS */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}

/* HERO */
.hero{
  position:relative;min-height:100svh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem 1.5rem 5rem;overflow:hidden;z-index:1;
}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orb-float 8s ease-in-out infinite;pointer-events:none}
.orb1{width:420px;height:420px;background:radial-gradient(circle,rgba(255,69,0,.35),transparent 70%);top:-80px;left:-100px}
.orb2{width:320px;height:320px;background:radial-gradient(circle,rgba(255,179,71,.25),transparent 70%);bottom:100px;right:-60px;animation-delay:-3s}
.orb3{width:240px;height:240px;background:radial-gradient(circle,rgba(192,57,43,.3),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-5s}
@keyframes orb-float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-30px) scale(1.05)}66%{transform:translate(-15px,15px) scale(.95)}}

.mandala{position:absolute;width:min(600px,90vw);height:min(600px,90vw);border-radius:50%;border:1px solid rgba(255,179,71,.12);animation:spin-slow 60s linear infinite;pointer-events:none}
.mandala::before,.mandala::after{content:'';position:absolute;inset:20px;border-radius:50%;border:1px solid rgba(255,107,53,.08)}
.mandala::after{inset:40px;border-color:rgba(255,69,0,.06);animation:spin-slow 30s linear infinite reverse}
@keyframes spin-slow{to{transform:rotate(360deg)}}

.floater{position:absolute;animation:float-emoji linear infinite;pointer-events:none;user-select:none;opacity:0}
@keyframes float-emoji{0%{transform:translateY(0) rotate(0deg);opacity:0}10%{opacity:.55}90%{opacity:.35}100%{transform:translateY(-100vh) rotate(360deg);opacity:0}}

.hero-eyebrow{
  display:inline-flex;align-items:center;gap:.5rem;padding:.4rem 1.1rem;
  border:1px solid rgba(255,179,71,.3);border-radius:999px;font-size:.72rem;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;color:var(--gold);
  background:rgba(255,179,71,.08);backdrop-filter:blur(8px);margin-bottom:1.5rem;
  animation:hero-in .8s cubic-bezier(.22,1,.36,1) both;
}
.dot-pulse{width:7px;height:7px;border-radius:50%;background:var(--wa);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(37,211,102,.5)}50%{box-shadow:0 0 0 6px rgba(37,211,102,0)}}

.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(3.5rem,11vw,7rem);font-weight:700;line-height:.95;color:#fff;animation:hero-in .8s .1s cubic-bezier(.22,1,.36,1) both}
.line-fire{display:block;background:linear-gradient(135deg,var(--fire),var(--gold),var(--ember));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradient-shift 4s ease infinite;background-size:200% 200%}
@keyframes gradient-shift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

.hero-tagline{font-size:clamp(.9rem,2.5vw,1.1rem);color:rgba(255,249,245,.55);font-weight:300;letter-spacing:.04em;margin:1.25rem 0 2.5rem;animation:hero-in .8s .2s cubic-bezier(.22,1,.36,1) both}

.hero-cta{
  display:inline-flex;align-items:center;gap:.6rem;padding:.95rem 2.2rem;border-radius:999px;
  background:linear-gradient(135deg,var(--fire),var(--ember));color:#fff;font-weight:700;font-size:1rem;
  border:none;cursor:pointer;
  box-shadow:0 8px 32px rgba(255,69,0,.4);
  animation:hero-in .8s .3s cubic-bezier(.22,1,.36,1) both,cta-pulse 3s 1.5s ease-in-out infinite;
  transition:transform .2s,box-shadow .2s;font-family:'Outfit',sans-serif;
}
.hero-cta:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 16px 48px rgba(255,69,0,.5)}
.hero-cta:active{transform:scale(.97)}
@keyframes cta-pulse{0%,100%{box-shadow:0 8px 32px rgba(255,69,0,.4),0 0 0 0 rgba(255,69,0,.2)}50%{box-shadow:0 8px 40px rgba(255,69,0,.5),0 0 0 14px rgba(255,69,0,0)}}

@keyframes hero-in{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}

.scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.4rem;animation:hero-in .8s .6s cubic-bezier(.22,1,.36,1) both;opacity:.4}
.scroll-hint span{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase}
.scroll-arrow{width:20px;height:30px;border:1.5px solid rgba(255,249,245,.4);border-radius:999px;position:relative}
.scroll-arrow::after{content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);width:3px;height:6px;border-radius:2px;background:var(--gold);animation:scroll-bob 1.5s ease-in-out infinite}
@keyframes scroll-bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}

/* STATS STRIP */
.stats-strip{position:relative;z-index:2;display:flex;justify-content:center;background:rgba(255,255,255,.04);border-top:1px solid var(--border);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);overflow-x:auto;scrollbar-width:none}
.stats-strip::-webkit-scrollbar{display:none}
.stat{flex:1;min-width:100px;padding:1.1rem .75rem;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--gold)}
.stat-label{font-size:.65rem;color:rgba(255,249,245,.4);text-transform:uppercase;letter-spacing:.08em;margin-top:.1rem}

/* CAT NAV */
.cat-nav{position:sticky;top:0;z-index:100;background:rgba(13,5,0,.88);backdrop-filter:blur(20px) saturate(1.5);border-bottom:1px solid var(--border);padding:.75rem 1rem;display:flex;gap:.5rem;overflow-x:auto;scrollbar-width:none}
.cat-nav::-webkit-scrollbar{display:none}
.cat-pill{flex-shrink:0;padding:.5rem 1.1rem;border-radius:999px;border:1px solid rgba(255,107,53,.2);background:transparent;color:rgba(255,249,245,.5);font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;position:relative;overflow:hidden}
.cat-pill::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--fire),var(--ember));opacity:0;transition:opacity .25s}
.cat-pill span{position:relative;z-index:1}
.cat-pill:hover{border-color:var(--ember);color:#fff;transform:translateY(-1px)}
.cat-pill.active{border-color:transparent;color:#fff;box-shadow:0 4px 16px rgba(255,69,0,.4);transform:translateY(-1px)}
.cat-pill.active::before{opacity:1}

/* MENU */
.menu-wrap{position:relative;z-index:2;max-width:980px;margin:0 auto;padding:2rem 1rem 140px}
.section-header{display:flex;align-items:center;gap:1rem;margin:2.5rem 0 1.25rem;position:relative}
.section-header::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.section-emoji-bg{width:44px;height:44px;border-radius:14px;background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.2);display:grid;place-items:center;font-size:1.3rem;flex-shrink:0}
.section-title{font-family:'Cormorant Garamond',serif;font-size:1.65rem;font-weight:700;color:#fff}
.section-count{font-size:.7rem;font-weight:600;color:var(--ember);background:rgba(255,107,53,.12);padding:.2rem .55rem;border-radius:999px;letter-spacing:.04em}

/* GRID */
.menu-grid{display:grid;grid-template-columns:1fr;gap:1rem}
@media(min-width:600px){.menu-grid{grid-template-columns:1fr 1fr}}
@media(min-width:900px){.menu-grid{grid-template-columns:1fr 1fr 1fr}}

/* CARDS */
.menu-card{
  background:linear-gradient(145deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
  border:1px solid rgba(255,107,53,.12);border-radius:var(--r);overflow:hidden;cursor:pointer;position:relative;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,border-color .3s;
  opacity:0;transform:translateY(24px) scale(.97);
  animation:card-appear .5s cubic-bezier(.22,1,.36,1) forwards;backdrop-filter:blur(4px);
}
.menu-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,69,0,.06),transparent);opacity:0;transition:opacity .3s;border-radius:var(--r);z-index:0}
.menu-card:hover{transform:translateY(-6px) scale(1.01);border-color:rgba(255,107,53,.35);box-shadow:0 20px 60px rgba(255,69,0,.15),0 4px 16px rgba(0,0,0,.3)}
.menu-card:hover::before{opacity:1}
@keyframes card-appear{to{opacity:1;transform:none}}

.card-img-wrap{overflow:hidden;position:relative}
.card-img{width:100%;height:180px;object-fit:cover;display:block;transition:transform .5s cubic-bezier(.22,1,.36,1);position:relative;z-index:1}
.menu-card:hover .card-img{transform:scale(1.07)}
.card-img-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(to top,rgba(13,5,0,.75),transparent);z-index:2;pointer-events:none}
.img-badges{position:absolute;top:.65rem;left:.65rem;right:.65rem;display:flex;justify-content:space-between;align-items:flex-start;z-index:3}
.badge{font-size:.6rem;font-weight:700;padding:.25rem .6rem;border-radius:999px;backdrop-filter:blur(8px);letter-spacing:.06em;text-transform:uppercase}
.badge.best{background:rgba(255,179,71,.9);color:#3D1F00}
.badge.veg{background:rgba(27,122,74,.85);color:#fff}
.badge.non{background:rgba(192,57,43,.85);color:#fff}
.badge.spice{background:rgba(255,69,0,.82);color:#fff}

.card-body{padding:1rem;position:relative;z-index:1}
.card-name{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:#fff;line-height:1.2;margin-bottom:.3rem}
.card-desc{font-size:.75rem;color:rgba(255,249,245,.45);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.8rem}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.card-price{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--gold)}
.card-price sup{font-size:.7em;vertical-align:super;font-family:'Outfit',sans-serif;font-weight:600}

.add-btn{display:flex;align-items:center;gap:.3rem;padding:.5rem 1rem;border-radius:999px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--fire),var(--ember));color:#fff;font-family:'Outfit',sans-serif;font-weight:700;font-size:.8rem;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;box-shadow:0 4px 12px rgba(255,69,0,.35);position:relative;overflow:hidden}
.add-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.15);opacity:0;transition:opacity .15s}
.add-btn:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(255,69,0,.5)}
.add-btn:hover::after{opacity:1}
.add-btn:active{transform:scale(.94)}

.qty-row{display:flex;align-items:center;gap:.6rem}
.qty-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;display:grid;place-items:center;font-size:1.1rem;font-weight:700;transition:transform .2s cubic-bezier(.34,1.56,.64,1),background .15s}
.qty-btn.minus{background:rgba(255,255,255,.1);color:#fff}
.qty-btn.minus:hover{background:rgba(255,255,255,.18);transform:scale(1.15)}
.qty-btn.plus{background:linear-gradient(135deg,var(--fire),var(--ember));color:#fff;box-shadow:0 3px 10px rgba(255,69,0,.4)}
.qty-btn.plus:hover{transform:scale(1.15);box-shadow:0 4px 16px rgba(255,69,0,.6)}
.qty-num{font-weight:700;font-size:1rem;color:#fff;min-width:1.5rem;text-align:center}

/* CART BAR */
.cart-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;padding:1rem 1rem 1.25rem;pointer-events:none;background:linear-gradient(to top,rgba(13,5,0,.95) 60%,transparent)}
.cart-btn{
  max-width:980px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,var(--fire) 0%,#FF8C00 100%);color:#fff;border-radius:var(--r);
  padding:1.1rem 1.4rem;border:none;cursor:pointer;width:100%;
  box-shadow:0 8px 40px rgba(255,69,0,.5),0 2px 8px rgba(0,0,0,.3);pointer-events:all;
  transform:translateY(120px);transition:transform .45s cubic-bezier(.34,1.36,.64,1),box-shadow .3s;
  position:relative;overflow:hidden;font-family:'Outfit',sans-serif;
}
.cart-btn::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent 0%,rgba(255,255,255,.07) 30%,transparent 60%);animation:spin-slow 6s linear infinite}
.cart-btn.visible{transform:translateY(0)}
.cart-btn:hover{box-shadow:0 12px 50px rgba(255,69,0,.65)}
.cart-btn-left{display:flex;align-items:center;gap:.85rem;position:relative;z-index:1}
.cart-chip{background:rgba(0,0,0,.25);border-radius:10px;padding:.2rem .65rem;font-size:.85rem;font-weight:800;display:flex;align-items:center;gap:.3rem}
.cart-label{font-weight:700;font-size:1rem}
.cart-total{position:relative;z-index:1;font-weight:800;font-size:1.05rem;letter-spacing:.02em}

/* SHEET */
.overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:400;background:linear-gradient(180deg,#1A0800 0%,#0D0500 100%);border:1px solid var(--border);border-bottom:none;border-radius:28px 28px 0 0;max-height:88vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .45s cubic-bezier(.34,1.2,.64,1);box-shadow:0 -20px 80px rgba(255,69,0,.1),0 -4px 24px rgba(0,0,0,.4)}
.sheet.open{transform:none}
.sheet-drag{width:44px;height:4px;border-radius:2px;background:rgba(255,249,245,.15);margin:14px auto 0;cursor:pointer}
.sheet-head{padding:1.25rem 1.4rem .9rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sheet-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:#fff}
.sheet-close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.07);border:none;cursor:pointer;display:grid;place-items:center;color:rgba(255,249,245,.5);font-size:1.1rem;transition:background .2s,color .2s}
.sheet-close:hover{background:rgba(255,69,0,.2);color:#fff}
.sheet-body{overflow-y:auto;flex:1;padding:1rem 1.4rem}
.sheet-body::-webkit-scrollbar{width:3px}
.sheet-body::-webkit-scrollbar-thumb{background:rgba(255,107,53,.3);border-radius:2px}

.cart-row{display:flex;align-items:center;gap:.9rem;padding:.9rem 0;border-bottom:1px solid rgba(255,255,255,.05);animation:row-in .35s cubic-bezier(.22,1,.36,1) both}
@keyframes row-in{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
.cart-row:last-child{border-bottom:none}
.cart-row-img{width:54px;height:54px;border-radius:12px;object-fit:cover;flex-shrink:0;border:1px solid rgba(255,107,53,.15)}
.cart-row-name{font-weight:600;font-size:.9rem;color:#fff}
.cart-row-sub{font-size:.75rem;color:rgba(255,249,245,.35);margin-top:.15rem}
.cart-row-price{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--gold);white-space:nowrap}

.empty-state{text-align:center;padding:3.5rem 1rem;animation:hero-in .5s ease both}
.empty-icon{font-size:3.5rem;margin-bottom:.75rem;animation:float-icon 3s ease-in-out infinite}
@keyframes float-icon{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.empty-text{color:rgba(255,249,245,.35);font-size:.88rem}

.sheet-foot{padding:1.2rem 1.4rem;border-top:1px solid var(--border);background:rgba(0,0,0,.3);backdrop-filter:blur(12px)}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem}
.total-label{font-size:.85rem;color:rgba(255,249,245,.45)}
.total-val{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:700;color:#fff}

/* WA CTA */
.wa-cta{width:100%;display:flex;align-items:center;justify-content:center;gap:.75rem;padding:1.1rem;border-radius:var(--r);border:none;cursor:pointer;background:linear-gradient(135deg,#128C7E,var(--wa));color:#fff;font-family:'Outfit',sans-serif;font-weight:700;font-size:1.05rem;box-shadow:0 8px 32px rgba(37,211,102,.3);transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;position:relative;overflow:hidden}
.wa-cta::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);transform:skewX(-20deg);animation:shine 3s 2s ease-in-out infinite}
@keyframes shine{0%{left:-100%}100%{left:200%}}
.wa-cta:hover{transform:scale(1.02) translateY(-2px);box-shadow:0 12px 44px rgba(37,211,102,.45)}
.wa-cta:active{transform:scale(.98)}
.wa-icon-wrap{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:1.2rem;flex-shrink:0}
.wa-note{text-align:center;font-size:.68rem;color:rgba(255,249,245,.3);margin-top:.65rem;letter-spacing:.04em}

/* TOAST */
.toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%) translateY(-80px) scale(.9);background:rgba(13,5,0,.95);color:#fff;border:1px solid rgba(255,107,53,.25);border-radius:999px;padding:.55rem 1.4rem;font-size:.82rem;font-weight:500;white-space:nowrap;z-index:999;backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,.3);transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;display:flex;align-items:center;gap:.5rem}
.toast.show{transform:translateX(-50%) translateY(0) scale(1);opacity:1}

/* SKELETON */
.skel-wrap{display:grid;grid-template-columns:1fr;gap:1rem}
@media(min-width:600px){.skel-wrap{grid-template-columns:1fr 1fr}}
.skel{height:260px;border-radius:var(--r);background:linear-gradient(110deg,rgba(255,255,255,.04) 25%,rgba(255,107,53,.08) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:shimmer 1.6s infinite}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}

/* RIPPLE */
@keyframes ripple-out{0%{transform:scale(.5);opacity:.8}100%{transform:scale(3.5);opacity:0}}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);pointer-events:none;animation:ripple-out .6s ease-out forwards}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- HERO -->
<header class="hero" id="top">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="mandala"></div>
  <div class="hero-eyebrow"><span class="dot-pulse"></span>Open &amp; Taking Orders</div>
  <h1>Spice<span class="line-fire">Garden</span></h1>
  <p class="hero-tagline">Authentic Indian cuisine crafted with ancestral fire</p>
  <button class="hero-cta" id="exploreCta">🍛 Explore the Menu</button>
  <div class="scroll-hint"><span>Scroll</span><div class="scroll-arrow"></div></div>
</header>

<!-- STATS -->
<div class="stats-strip">
  <div class="stat"><div class="stat-val" id="sItems">—</div><div class="stat-label">Dishes</div></div>
  <div class="stat"><div class="stat-val" id="sCats">—</div><div class="stat-label">Categories</div></div>
  <div class="stat"><div class="stat-val">4.9★</div><div class="stat-label">Rating</div></div>
  <div class="stat"><div class="stat-val">₹0</div><div class="stat-label">Commission</div></div>
</div>

<!-- CAT NAV -->
<nav class="cat-nav" id="catNav"></nav>

<!-- MENU -->
<main class="menu-wrap" id="menuWrap">
  <div class="skel-wrap" id="skeletons">
    <div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div>
  </div>
</main>

<!-- CART BAR -->
<div class="cart-bar">
  <button class="cart-btn" id="cartBtn" style="display:none">
    <div class="cart-btn-left">
      <div class="cart-chip">🛒 <span id="cartCount">0</span></div>
      <span class="cart-label">View Your Order</span>
    </div>
    <span class="cart-total" id="cartBarTotal">₹0</span>
  </button>
</div>

<!-- OVERLAY & SHEET -->
<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-drag" id="sheetDrag"></div>
  <div class="sheet-head">
    <h2 class="sheet-title">🔥 Your Order</h2>
    <button class="sheet-close" id="sheetClose">✕</button>
  </div>
  <div class="sheet-body" id="sheetBody">
    <div class="empty-state"><div class="empty-icon">🍽️</div><p class="empty-text">Add something delicious!</p></div>
  </div>
  <div class="sheet-foot">
    <div class="total-row"><span class="total-label">Total Amount</span><span class="total-val" id="totalVal">₹0</span></div>
    <button class="wa-cta" id="waBtn">
      <div class="wa-icon-wrap">💬</div>
      Order via WhatsApp — Zero Commission
    </button>
    <p class="wa-note">💸 No platform fees &nbsp;•&nbsp; Direct to restaurant &nbsp;•&nbsp; Instant confirmation</p>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✨ <span id="toastMsg"></span></div>

<script>
/* PARTICLE SYSTEM */
(function(){
  const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
  let W,H,pts=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<55;i++)pts.push({x:Math.random()*1200,y:Math.random()*900,r:Math.random()*1.8+.3,vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.18,alpha:Math.random()*.35+.05,hue:Math.random()*30+10});
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},100%,65%,${p.alpha})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* FLOATING EMOJIS */
(function(){
  const emojis=['🌶️','🍛','🫓','🍮','🥘','🧅','🌿','🫚','⭐','✨','🔥','🎇'];
  function spawn(){
    const el=document.createElement('div');el.className='floater';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=Math.random()*100+'vw';el.style.bottom='-60px';
    el.style.fontSize=(1.2+Math.random()*1.4)+'rem';
    const dur=8+Math.random()*10;el.style.animationDuration=dur+'s';
    document.querySelector('.hero').appendChild(el);
    setTimeout(()=>el.remove(),dur*1000+500);
  }
  setInterval(spawn,1200);
})();

/* STATE */
const API='restaurant-order-whatsapp-integration-production.up.railway.app',RID=1;
let restaurant=null,categories=[],allItems=[],cart={},activeFilter='all';

async function fetchData(){
  try{
    const[rR,cR,mR]=await Promise.all([fetch(`${API}/restaurants/${RID}`),fetch(`${API}/restaurants/${RID}/categories`),fetch(`${API}/restaurants/${RID}/menu`)]);
    restaurant=await rR.json();categories=await cR.json();allItems=await mR.json();boot();
  }catch{useDemoData()}
}

    {id:5,category_id:2,name:'Hyderabadi Dum Biryani',price:349,is_veg:false,is_bestseller:true,spice_level:2,description:'Slow-cooked basmati rice layered with tender mutton in authentic dum style.',image_url:'https://images.unsplash.com/photo-1563379091339-03246963d96c?w=600'},

    {id:7,category_id:2,name:'Chicken Biryani',price:319,is_veg:false,is_bestseller:true,spice_level:2,description:'Juicy chicken slow-cooked with basmati and aromatic spices.',image_url:'https://images.unsplash.com/photo-1563379091339-03246963d96c?w=600'},
    {id:8,category_id:2,name:'Prawn Biryani',price:399,is_veg:false,is_bestseller:false,spice_level:3,description:'Succulent prawns in coastal masala, layered with saffron-kissed basmati.',image_url:'https://images.unsplash.com/photo-1590502160462-58b41354f588?w=600'},

    {id:16,category_id:5,name:'Kulfi Falooda',price:149,is_veg:true,is_bestseller:true,spice_level:0,description:'Creamy traditional kulfi with vermicelli, basil seeds and rose syrup.',image_url:'https://images.unsplash.com/photo-1567337710282-00832b415979?w=600'},
    {id:17,category_id:6,name:'Mango Lassi',price:99,is_veg:true,is_bestseller:true,spice_level:0,description:'Thick yogurt blended with sweet Alphonso mango pulp.',image_url:'https://images.unsplash.com/photo-1571167530149-c1105da4c2f4?w=600'},
    {id:18,category_id:6,name:'Virgin Mojito',price:119,is_veg:true,is_bestseller:false,spice_level:0,description:'Fresh lime, crushed mint and soda over cracked ice.',image_url:'https://images.unsplash.com/photo-1574090945491-e13cb157bdf6?w=600'},
  ];

function boot(){
  document.getElementById('sItems').textContent=allItems.length;
  document.getElementById('sCats').textContent=categories.length;
  buildCatNav();renderMenu(allItems);
  document.getElementById('skeletons').style.display='none';
}

function buildCatNav(){
  const nav=document.getElementById('catNav');nav.innerHTML='';
  const all=document.createElement('button');all.className='cat-pill active';all.dataset.cat='all';all.innerHTML='<span>🍽️ All</span>';nav.appendChild(all);
  categories.forEach(c=>{const b=document.createElement('button');b.className='cat-pill';b.dataset.cat=c.id;b.innerHTML=`<span>${c.emoji} ${c.name}</span>`;nav.appendChild(b)});
  nav.addEventListener('click',e=>{
    const b=e.target.closest('.cat-pill');if(!b)return;
    nav.querySelectorAll('.cat-pill').forEach(x=>x.classList.remove('active'));b.classList.add('active');
    activeFilter=b.dataset.cat;
    const filtered=activeFilter==='all'?allItems:allItems.filter(i=>i.category_id==activeFilter);
    renderMenu(filtered);document.getElementById('menuWrap').scrollIntoView({behavior:'smooth',block:'start'});
  });
}

function renderMenu(items){
  const wrap=document.getElementById('menuWrap');wrap.innerHTML='';
  const grouped={};categories.forEach(c=>{grouped[c.id]=[]});
  items.forEach(i=>{(grouped[i.category_id]=grouped[i.category_id]||[]).push(i)});
  let delay=0;
  if(activeFilter!=='all'){
    const g=document.createElement('div');g.className='menu-grid';
    items.forEach(i=>{g.appendChild(makeCard(i,delay));delay+=60});wrap.appendChild(g);
  } else {
    categories.forEach(cat=>{
      const catItems=grouped[cat.id]||[];if(!catItems.length)return;
      const h=document.createElement('div');h.className='section-header';
      h.innerHTML=`<div class="section-emoji-bg">${cat.emoji}</div><h2 class="section-title">${cat.name}</h2><span class="section-count">${catItems.length} items</span>`;
      wrap.appendChild(h);
      const g=document.createElement('div');g.className='menu-grid';
      catItems.forEach(i=>{g.appendChild(makeCard(i,delay));delay+=55});wrap.appendChild(g);
    });
  }
}

const SPICE=['','🌶 Mild','🌶🌶 Medium','🌶🌶🌶 Hot'];
const FB='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600';

function makeCard(item,delayMs){
  const qty=cart[item.id]?.qty||0;
  const el=document.createElement('div');el.className='menu-card';el.style.animationDelay=`${delayMs}ms`;el.dataset.id=item.id;
  el.innerHTML=`
    <div class="card-img-wrap">
      <img class="card-img" src="${item.image_url||FB}" alt="${item.name}" loading="lazy" onerror="this.src='${FB}'"/>
      <div class="img-badges">
        <span class="badge ${item.is_veg?'veg':'non'}">${item.is_veg?'● VEG':'● NON-VEG'}</span>
        <div style="display:flex;gap:.35rem;flex-direction:column;align-items:flex-end">
          ${item.is_bestseller?'<span class="badge best">⭐ Bestseller</span>':''}
          ${item.spice_level?`<span class="badge spice">${SPICE[item.spice_level]}</span>`:''}
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-name">${item.name}</div>
      <div class="card-desc">${item.description}</div>
      <div class="card-footer">
        <div class="card-price"><sup>₹</sup>${item.price}</div>
        <div class="qty-row">
          ${qty>0?`<button class="qty-btn minus" data-id="${item.id}">−</button><span class="qty-num">${qty}</span>`:''}
          <button class="${qty>0?'qty-btn plus':'add-btn'}" data-id="${item.id}">${qty>0?'+':'+ Add'}</button>
        </div>
      </div>
    </div>`;
  return el;
}

/* CART */
document.getElementById('menuWrap').addEventListener('click',e=>{
  const btn=e.target.closest('[data-id]');if(!btn||btn.tagName!=='BUTTON')return;
  const id=parseInt(btn.dataset.id),item=allItems.find(i=>i.id===id);if(!item)return;
  if(btn.classList.contains('minus')){if(cart[id]){cart[id].qty--;if(cart[id].qty<=0)delete cart[id]}}
  else{
    if(!cart[id])cart[id]={item,qty:0};cart[id].qty++;
    const r=document.createElement('div');r.className='ripple';
    const rect=btn.getBoundingClientRect(),size=Math.max(btn.offsetWidth,btn.offsetHeight);
    r.style.cssText=`width:${size}px;height:${size}px;top:${e.clientY-rect.top-size/2}px;left:${e.clientX-rect.left-size/2}px`;
    btn.style.position='relative';btn.appendChild(r);setTimeout(()=>r.remove(),700);
    showToast(`${item.name} added 🔥`);
  }
  refreshCart();
  const card=document.querySelector(`.menu-card[data-id="${id}"]`);
  if(card){const nc=makeCard(item,0);nc.style.animationDelay='0ms';card.replaceWith(nc)}
});

function cartTotal(){return Object.values(cart).reduce((s,e)=>s+e.item.price*e.qty,0)}
function cartCount(){return Object.values(cart).reduce((s,e)=>s+e.qty,0)}

function refreshCart(){
  const count=cartCount(),total=cartTotal();
  const cb=document.getElementById('cartBtn');
  cb.style.display=count>0?'flex':'none';cb.classList.toggle('visible',count>0);
  document.getElementById('cartCount').textContent=count;
  document.getElementById('cartBarTotal').textContent=`₹${total.toLocaleString('en-IN')}`;
  document.getElementById('totalVal').textContent=`₹${total.toLocaleString('en-IN')}`;
  const body=document.getElementById('sheetBody');
  if(!count){body.innerHTML='<div class="empty-state"><div class="empty-icon">🍽️</div><p class="empty-text">Add something delicious!</p></div>';return}
  body.innerHTML=Object.values(cart).map(({item,qty},i)=>`
    <div class="cart-row" style="animation-delay:${i*60}ms">
      <img class="cart-row-img" src="${item.image_url||FB}" alt="${item.name}" onerror="this.src='${FB}'"/>
      <div style="flex:1"><div class="cart-row-name">${item.name}</div><div class="cart-row-sub">₹${item.price} × ${qty}</div></div>
      <div class="qty-row">
        <button class="qty-btn minus" data-id="${item.id}">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn plus" data-id="${item.id}">+</button>
      </div>
      <div class="cart-row-price">₹${(item.price*qty).toLocaleString('en-IN')}</div>
    </div>`).join('');
}

document.getElementById('sheetBody').addEventListener('click',e=>{
  const btn=e.target.closest('[data-id]');if(!btn||btn.tagName!=='BUTTON')return;
  const id=parseInt(btn.dataset.id),item=allItems.find(i=>i.id===id);if(!item)return;
  if(btn.classList.contains('minus')){if(cart[id]){cart[id].qty--;if(cart[id].qty<=0)delete cart[id]}}
  else{if(!cart[id])cart[id]={item,qty:0};cart[id].qty++}
  refreshCart();
  const card=document.querySelector(`.menu-card[data-id="${id}"]`);
  if(card){const nc=makeCard(item,0);nc.style.animationDelay='0ms';card.replaceWith(nc)}
});

/* SHEET */
const sheet=document.getElementById('sheet'),overlay=document.getElementById('overlay');
function openSheet(){sheet.classList.add('open');overlay.classList.add('open');document.body.style.overflow='hidden'}
function closeSheet(){sheet.classList.remove('open');overlay.classList.remove('open');document.body.style.overflow=''}
document.getElementById('cartBtn').addEventListener('click',openSheet);
document.getElementById('sheetClose').addEventListener('click',closeSheet);
overlay.addEventListener('click',closeSheet);
document.getElementById('sheetDrag').addEventListener('click',closeSheet);
let startY=0;
sheet.addEventListener('touchstart',e=>{startY=e.touches[0].clientY},{passive:true});
sheet.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-startY>80)closeSheet()},{passive:true});

/* WHATSAPP */
document.getElementById('waBtn').addEventListener('click',()=>{
  if(!cartCount())return;
  const phone=restaurant?.whatsapp_number||'91966020036';
  const lines=Object.values(cart).map(({item,qty})=>`▪ ${item.name} × ${qty}  —  ₹${(item.price*qty).toLocaleString('en-IN')}`);
  const msg=[`🌶️ *New Order — ${restaurant?.name||'Spice Garden'}*`,``,...lines,``,`━━━━━━━━━━━━━━━━━━━━`,`💰 *Total: ₹${cartTotal().toLocaleString('en-IN')}*`,``,`📱 _Ordered via online menu_  ✅`].join('\n');
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');
  showToast('Opening WhatsApp 🎉');closeSheet();
});

document.getElementById('exploreCta').addEventListener('click',()=>document.getElementById('catNav').scrollIntoView({behavior:'smooth'}));

/* TOAST */
let tt;
function showToast(msg){
  document.getElementById('toastMsg').textContent=msg;
  document.getElementById('toast').classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>document.getElementById('toast').classList.remove('show'),2000);
}

/* SCROLL SPY */
const spy=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(!e.isIntersecting)return;const id=e.target.dataset.catId;document.querySelectorAll('.cat-pill').forEach(b=>b.classList.toggle('active',b.dataset.cat==id||(id===undefined&&b.dataset.cat==='all')))});
},{rootMargin:'-35% 0px -55% 0px'});
new MutationObserver(()=>{document.querySelectorAll('.section-header').forEach((el,i)=>{el.dataset.catId=categories[i]?.id;spy.observe(el)})}).observe(document.getElementById('menuWrap'),{childList:true});

fetchData();
</script>
</body>
</html>
